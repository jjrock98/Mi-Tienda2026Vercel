name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ─── Unit Tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --ci
        env:
          # Mock env vars for tests
          NEXT_PUBLIC_SUPABASE_URL:           https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY:      test-anon-key
          SUPABASE_SERVICE_ROLE_KEY:          test-service-key
          MERCADOPAGO_ACCESS_TOKEN:           TEST-test
          NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: TEST-test
          STRIPE_SECRET_KEY:                  sk_test_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_WEBHOOK_SECRET:              whsec_test_placeholder
          RESEND_API_KEY:                     re_test_placeholder
          RESEND_FROM_EMAIL:                  test@test.com
          NEXT_PUBLIC_APP_URL:                https://mc-importados.xyz

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL:           ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:      ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:          ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MERCADOPAGO_ACCESS_TOKEN:           ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
          NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY }}
          STRIPE_SECRET_KEY:                  ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET:              ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY:                     ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:                  ${{ secrets.RESEND_FROM_EMAIL }}
          NEXT_PUBLIC_APP_URL:                ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_TIENDA_NOMBRE:          ${{ secrets.NEXT_PUBLIC_TIENDA_NOMBRE }}

      - name: Check bundle size
        run: |
          echo "Build completed. Bundle analysis:"
          du -sh .next/static/chunks/*.js 2>/dev/null | sort -h | tail -20 || true

  # ─── E2E Tests (solo en PRs a main) ──────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL:           ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY:      ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY:          ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MERCADOPAGO_ACCESS_TOKEN:           ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
          NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY }}
          STRIPE_SECRET_KEY:                  ${{ secrets.STRIPE_SECRET_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET:              ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY:                     ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:                  ${{ secrets.RESEND_FROM_EMAIL }}
          NEXT_PUBLIC_APP_URL:                https://mc-importados.xyz

      - name: Run E2E tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://mc-importados.xyz

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
